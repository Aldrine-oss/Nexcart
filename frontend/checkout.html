<!DOCTYPE html>
<html>
<head>
  <title>NexCart - Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    .navbar {
      background: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .total {
      font-size: 18px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h2>NexCart</h2>
    <a href="cart.html" style="color:white;">Back to Cart</a>
  </div>

  <!-- CHECKOUT BOX -->
  <div class="container">
    <h2>Checkout</h2>

    <div class="total">
      Total: UGX <span id="totalAmount">0</span>
    </div>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="phone" placeholder="Phone Number (07...)" required>

    <button onclick="payNow()">Pay with Mobile Money</button>
  </div>

  <script>
    // 🛒 Load cart from localStorage
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    let total = 0;
    cart.forEach(item => {
      total += item.price;
    });

    document.getElementById("totalAmount").innerText = total;

    // 💳 Pay function
    async function payNow() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;

      if (!name || !email || !phone) {
        alert("Please fill all fields");
        return;
      }

      try {
        const response = await fetch("https://your-backend-url/api/payment/pesapal", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount: total,
            email,
            phone,
            name
          })
        });

        const data = await response.json();

        // 🔥 Redirect to Pesapal
        window.location.href = data.redirect_url;

      } catch (err) {
        alert("Payment failed. Try again.");
        console.log(err);
      }
    }
  </script>

</body>
</html>
