<h2>Your Cart 🛒</h2>

<div style="display:flex; justify-content:space-between; background:#111; color:white; padding:15px;">
  <h2>NexCart</h2>

  <div>
    <a href="index.html" style="color:white; margin:10px;">Home</a>
    <a href="cart.html" style="color:white; margin:10px;">Cart</a>
    <a href="login.html" style="color:white; margin:10px;">Login</a>
  </div>
</div>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #111;
}

button {
  background: #111;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #333;
}
</style>

<div id="cart"></div>
<h3 id="total"></h3>

<a href="checkout.html">Go to Checkout</a>

<script>
const API = "https://your-backend.up.railway.app";

fetch(API + "/api/cart", {
  headers: { "auth-token": localStorage.getItem("token") }
})
.then(res => res.json())
.then(data => {
  let html = "";
  let total = 0;

  data.forEach(p => {
    html += `<p>${p.name} - ${p.price}</p>`;
    total += p.price;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "Total: " + total;
});
</script>
